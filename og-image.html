<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0c0c0c;
    color: #e0e0e0;
    font-family: 'Space Mono', monospace;
  }

  .card {
    width: 1200px;
    height: 630px;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 50px;
    padding: 0;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    top: -200px;
    left: -50px;
    background: rgba(74, 222, 128, 0.05);
    border-radius: 50%;
    filter: blur(150px);
    pointer-events: none;
  }

  .icon {
    flex-shrink: 0;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    object-fit: cover;
    filter: drop-shadow(0 0 60px rgba(74, 222, 128, 0.1));
  }

  .text {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .logo {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #e0e0e0;
  }
  .logo .ai { color: #4ade80; }

  .title {
    font-family: 'Newsreader', serif;
    font-weight: 300;
    font-size: 5rem;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .title em {
    font-style: italic;
    color: #4ade80;
  }

  .sub {
    font-family: 'Newsreader', serif;
    font-weight: 300;
    font-size: 1.9rem;
    color: #bbb;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <img class="icon" src="qaloon-512.png" alt="">
    <div class="text">
      <div class="logo">quran<span class="ai">.ai</span></div>
      <h1 class="title">Building the Quran's<br>infrastructure for <em>AI</em></h1>
      <p class="sub">Reliable Quran tools, powered by AI, built for people.</p>
    </div>
  </div>
</body>
</html>
